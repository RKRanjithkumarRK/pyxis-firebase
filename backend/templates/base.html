<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pyxis One{% endblock %}</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#a855f7',
            surface: { DEFAULT: '#18181b', light: '#f4f4f5' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase SDK (CDN — vanilla JS, no npm/TypeScript) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, onAuthStateChanged, signInWithPopup,
      GoogleAuthProvider, signOut, signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "{{ firebase_api_key }}",
      authDomain:        "{{ firebase_auth_domain }}",
      projectId:         "{{ firebase_project_id }}",
      storageBucket:     "{{ firebase_storage_bucket }}",
      messagingSenderId: "{{ firebase_messaging_sender_id }}",
      appId:             "{{ firebase_app_id }}",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Expose to window so other scripts can use it
    window._auth     = auth;
    window._firebase = { signInWithPopup, GoogleAuthProvider, signOut,
                         signInWithEmailAndPassword, createUserWithEmailAndPassword,
                         onAuthStateChanged };

    // Auth state → store token, update UI
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window._user  = user;
        window._token = await user.getIdToken();
        document.dispatchEvent(new CustomEvent('pyxis:authed', { detail: user }));
      } else {
        window._user  = null;
        window._token = null;
        document.dispatchEvent(new CustomEvent('pyxis:signedout'));
      }
    });

    // Refresh token every 55 min
    setInterval(async () => {
      if (window._auth.currentUser) {
        window._token = await window._auth.currentUser.getIdToken(true);
      }
    }, 55 * 60 * 1000);

    // Helpers
    window.pyxisSignIn = async () => {
      const provider = new GoogleAuthProvider();
      try { await signInWithPopup(auth, provider); }
      catch (e) { console.error('Sign in failed', e); }
    };
    window.pyxisSignOut = () => signOut(auth);
    window.authFetch = (url, opts = {}) => {
      opts.headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${window._token}` };
      return fetch(url, opts);
    };
  </script>

  <link rel="stylesheet" href="/static/css/app.css"/>
  {% block head %}{% endblock %}
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased">

  <!-- Sidebar -->
  <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col z-40 transition-transform -translate-x-full lg:translate-x-0">
    <!-- Logo -->
    <div class="flex items-center gap-3 p-5 border-b border-zinc-800">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white font-bold text-sm">P</div>
      <span class="font-semibold text-white">Pyxis One</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <a href="/hub"    class="nav-link {% block nav_hub %}{% endblock %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Hub
      </a>
      <a href="/chat"   class="nav-link {% block nav_chat %}{% endblock %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        Chat
      </a>
      <a href="/images" class="nav-link {% block nav_images %}{% endblock %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Images
      </a>
      <a href="/voice"  class="nav-link {% block nav_voice %}{% endblock %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
        Voice
      </a>
    </nav>

    <!-- User info -->
    <div class="p-3 border-t border-zinc-800">
      <div id="user-info" class="hidden flex items-center gap-3 p-2 rounded-lg hover:bg-zinc-800 cursor-pointer" onclick="window.pyxisSignOut()">
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-zinc-700" alt=""/>
        <div class="flex-1 min-w-0">
          <p id="user-name"  class="text-sm font-medium truncate"></p>
          <p id="user-email" class="text-xs text-zinc-400 truncate"></p>
        </div>
      </div>
      <div id="sign-in-btn" class="flex items-center gap-2 p-2 text-sm text-zinc-400 hover:text-white cursor-pointer rounded-lg hover:bg-zinc-800" onclick="window.pyxisSignIn()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Sign in
      </div>
    </div>
  </div>

  <!-- Mobile sidebar toggle -->
  <button id="sidebar-toggle" class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-zinc-900 rounded-lg border border-zinc-800" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <!-- Main content -->
  <main class="lg:pl-64 min-h-screen">
    {% block content %}{% endblock %}
  </main>

  <!-- Auth state script -->
  <script>
    document.addEventListener('pyxis:authed', (e) => {
      const user = e.detail;
      document.getElementById('user-info').classList.remove('hidden');
      document.getElementById('sign-in-btn').classList.add('hidden');
      document.getElementById('user-name').textContent  = user.displayName || 'User';
      document.getElementById('user-email').textContent = user.email || '';
      if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
      if (window.onUserReady) window.onUserReady(user);
    });
    document.addEventListener('pyxis:signedout', () => {
      document.getElementById('user-info').classList.add('hidden');
      document.getElementById('sign-in-btn').classList.remove('hidden');
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
