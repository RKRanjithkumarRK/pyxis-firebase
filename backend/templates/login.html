<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — Pyxis One</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; }</style>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider,
             signInWithEmailAndPassword, createUserWithEmailAndPassword }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const app  = initializeApp({
      apiKey:            "{{ firebase_api_key }}",
      authDomain:        "{{ firebase_auth_domain }}",
      projectId:         "{{ firebase_project_id }}",
      storageBucket:     "{{ firebase_storage_bucket }}",
      messagingSenderId: "{{ firebase_messaging_sender_id }}",
      appId:             "{{ firebase_app_id }}",
    });
    const auth = getAuth(app);

    window.signInGoogle = async () => {
      setLoading(true);
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
        window.location.href = '/chat';
      } catch (e) { showError(e.message); setLoading(false); }
    };

    window.signInEmail = async () => {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) return showError('Enter email and password');
      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = '/chat';
      } catch (e) { showError(e.message); setLoading(false); }
    };

    window.signUpEmail = async () => {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) return showError('Enter email and password');
      setLoading(true);
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        window.location.href = '/chat';
      } catch (e) { showError(e.message); setLoading(false); }
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function setLoading(v) {
      document.getElementById('loading').classList.toggle('hidden', !v);
      document.getElementById('form').classList.toggle('opacity-50', v);
    }
  </script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 text-white font-bold text-xl mb-4">P</div>
      <h1 class="text-2xl font-bold text-white">Pyxis One</h1>
      <p class="text-zinc-400 text-sm mt-1">AI-powered productivity platform</p>
    </div>

    <!-- Card -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-4">

      <div id="error-msg" class="hidden bg-red-900/30 border border-red-800 text-red-300 text-sm rounded-lg p-3"></div>
      <div id="loading"   class="hidden text-center text-zinc-400 text-sm py-2">Signing in…</div>

      <div id="form" class="space-y-4">
        <!-- Google -->
        <button onclick="window.signInGoogle()" class="w-full flex items-center justify-center gap-3 bg-white text-zinc-900 font-medium py-2.5 px-4 rounded-xl hover:bg-zinc-100 transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <div class="flex items-center gap-3">
          <div class="flex-1 h-px bg-zinc-800"></div>
          <span class="text-xs text-zinc-500">or</span>
          <div class="flex-1 h-px bg-zinc-800"></div>
        </div>

        <!-- Email/Password -->
        <div class="space-y-3">
          <input id="email"    type="email"    placeholder="Email address"
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-zinc-500 focus:border-purple-500 transition"/>
          <input id="password" type="password" placeholder="Password"
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-zinc-500 focus:border-purple-500 transition"
                 onkeydown="if(event.key==='Enter') window.signInEmail()"/>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="window.signInEmail()"  class="py-2.5 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium rounded-xl transition">Sign in</button>
          <button onclick="window.signUpEmail()"  class="py-2.5 bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-medium rounded-xl border border-zinc-700 transition">Sign up</button>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-zinc-600 mt-6">Pyxis One · Built with Python + FastAPI</p>
  </div>
</body>
</html>
