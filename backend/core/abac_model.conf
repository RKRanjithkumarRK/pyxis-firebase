# Pyxis One — ABAC model for Casbin
# Attribute-Based Access Control with domain (org) tenancy
#
# Subject attributes come from the calling user's ABAC context dict:
#   {role, plan, org_id, workspace_id, user_id}
# Object is a resource string: e.g. "sessions", "mcp_servers", "flags"
# Action: read | write | delete | admin

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act, eft

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && r.obj == p.obj && r.act == p.act
