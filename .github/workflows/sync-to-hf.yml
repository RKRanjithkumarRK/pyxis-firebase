name: Sync backend → HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/sync-to-hf.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend/ to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          # Clone the HF Space repo
          git clone https://ranjith00743:${HF_TOKEN}@huggingface.co/spaces/ranjith00743/pyxis-one-backend hf_space

          # Sync backend/ contents into HF Space root
          # Keep the HF Space README.md (has the Space config header)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='static/dist/' \
            --exclude='static/css/' \
            --exclude='*.db' \
            backend/ hf_space/

          # Commit and push
          cd hf_space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync from GitHub @ ${{ github.sha }}"
            git push
            echo "✅ Pushed to HuggingFace Space."
          fi
