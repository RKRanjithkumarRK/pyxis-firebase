  <polygon points="32,56 35,37 32,42 29,37" fill="#10a37f"/>
  <polygon points="8,32 27,29 22,32 27,35" fill="#10a37f"/>
  <polygon points="56,32 37,29 42,32 37,35" fill="#10a37f"/>
</svg>
