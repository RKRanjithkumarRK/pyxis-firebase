<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#212121"/>
  <!-- Pyxis "star compass" mark in accent green -->
  <circle cx="32" cy="32" r="10" fill="#10a37f" opacity="0.18"/>
  <circle cx="32" cy="32" r="5" fill="#10a37f"/>
  <!-- Four compass points -->
